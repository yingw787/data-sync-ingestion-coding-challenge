# DataSync Ingestion Challenge Workspace
# Set TARGET_API_KEY + API_BASE_URL in .env before running sh run-ingestion.sh

services:
  postgres:
    image: postgres:16-alpine
    container_name: assignment-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ingestion
    ports:
      - "5434:5432"
    volumes:
      - assignment_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - assignment-network

  ingestion:
    build: ./packages/ingestion
    container_name: assignment-ingestion
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ingestion
      API_BASE_URL: ${API_BASE_URL}
      TARGET_API_KEY: ${TARGET_API_KEY}
      BATCH_SIZE: ${BATCH_SIZE}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY}
      RATE_LIMIT_BUFFER: ${RATE_LIMIT_BUFFER}
      CHECKPOINT_INTERVAL: ${CHECKPOINT_INTERVAL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - assignment-network

volumes:
  assignment_postgres_data:

networks:
  assignment-network:
    driver: bridge
